name: eloai-service
version: 1.2.3
description: |
  A sample YAML configuration file
  with multiple lines and various structures.

server:
  host: 0.0.0.0
  port: 8080
  timeout: 30

database:
  type: lmdb
  path: /var/lib/eloai/dictionary.lmdb
  map_size: 1G
  readonly: true

logging:
  level: info
  format: json
  outputs:
    - stdout
    - /var/log/eloai/service.log

features:
  - compression
  - decompression
  - round_trip_verification

env:
  - name: ELOAI_HOME
    value: /opt/eloai
  - name: ELOAI_DEBUG
    value: "false"
